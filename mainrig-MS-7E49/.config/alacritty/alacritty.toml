# Configuration for Alacritty, the GPU-accelerated terminal emulator.

[window]
# Window dimensions (changes require restart)
dimensions = { columns = 60, lines = 24 }

# Window padding (in pixels)
padding = { x = 2, y = 2 }

# Spread additional padding evenly around the terminal content.
dynamic_padding = false

# Window decorations (full, none, transparent, buttonless)
decorations = "full"

# Background opacity (0.0 to 1.0)
opacity = 1.0

# Startup mode (Windowed, Maximized, Fullscreen)
startup_mode = "Windowed"

[scrolling]
# Maximum number of lines in the scrollback buffer.
# '0' will disable scrolling.
history = 10000

# Number of lines the display scrolls by when using the mouse wheel.
multiplier = 3

[font]
# The normal and bold font faces.
normal = { family = "monospace", style = "Regular" }
bold = { family = "monospace", style = "Bold" }
italic = { family = "monospace", style = "Italic" }

# Point size
size = 18.0

[colors]
# Default colors
primary = { background = "#1d1f21", foreground = "#c5c8c6" }

# Normal colors
normal = { black = "#1d1f21", red = "#cc6666", green = "#b5bd68", yellow = "#f0c674", blue = "#81a2be", magenta = "#b294bb", cyan = "#8abeb7", white = "#c5c8c6" }

# Bright colors
bright = { black = "#666666", red = "#d54e53", green = "#b9ca4a", yellow = "#e7c547", blue = "#7aa6da", magenta = "#c397d8", cyan = "#70c0b1", white = "#eaeaea" }

[cursor]
# Cursor style (Block, Underline, Beam)
style = { shape = "Block", blinking = "Off" }

# Time it takes for the cursor to blink (in milliseconds)
blink_interval = 750

[terminal]

[selection]
# Characters that are considered part of a "word" when double-clicking.
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"

# When set to true, selected text is copied to the clipboard.
save_to_clipboard = false
