# ~/.config/llama-swap/config.yaml
# One OpenAI-compatible endpoint on :8080 that hot-swaps models.
# Backend: llama.cpp Vulkan (fastest path on RDNA4 / gfx1201).
#
# KEY FACTS baked in from the probe:
#   * GGML_VK_VISIBLE_DEVICES=1  -> the 9070 XT (iGPU is Vulkan device 0).
#   * --cpu-range 8-15           -> the FREQUENCY CCD (cores 0-7 are the
#                                   V-cache die; the freq die wins for the
#                                   bandwidth-bound CPU-offloaded experts).
#   * --n-cpu-moe values are STARTING POINTS. Tune: raise until it loads
#     without OOM, then lower while watching `rocm-smi --showmeminfo vram`
#     until ~13 GB is used (leaves headroom for Sway + browsers on the
#     same card). Lower n-cpu-moe = more experts on GPU = faster.

healthCheckTimeout: 300
logLevel: info

models:
  # ---- daily driver: 30B MoE, ~3B active, mostly on-GPU, stays warm ----
  "coder-30b":
    aliases: ["qwen3-coder", "default"]
    env:
      - "GGML_VK_VISIBLE_DEVICES=1"
    cmd: >
      llama-server
      --host 127.0.0.1 --port ${PORT}
      -m /mnt/data1/models/qwen3-coder-30b-a3b-Q4_K_M.gguf
      -ngl 999 --n-cpu-moe 8
      -fa on
      -c 32768 -b 4096 -ub 1024
      -t 8 --cpu-range 8-15 --cpu-strict 1
      --jinja
    ttl: 1800          # stays loaded 30 min after last request

  # ---- heavyweight reasoning: 120B MoE, ~5B active, experts in RAM ----
  # Auto-downloads on first use. Unloads quickly to give the 60+ GB back.
  "gpt-oss-120b":
    env:
      - "GGML_VK_VISIBLE_DEVICES=1"
    cmd: >
      llama-server
      --host 127.0.0.1 --port ${PORT}
      -hf ggml-org/gpt-oss-120b-GGUF
      -ngl 999 --n-cpu-moe 34
      -fa on
      -c 32768 -b 4096 -ub 4096
      -t 8 --cpu-range 8-15 --cpu-strict 1
      --jinja
    ttl: 120           # unloads 2 min after last request to free RAM
