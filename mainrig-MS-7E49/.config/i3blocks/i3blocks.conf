SCRIPT_DIR=/home/blu/.local/libexec/i3blocks
CUSTOM_DIR=/home/blu/.config/i3blocks/i3blocks/custom

[cpu_clock]
command=awk '{if($1>max) max=$1} END {printf "%.1f GHz\n", max/1000000}' /sys/devices/system/cpu/cpu*/cpufreq/scaling_cur_freq
label=CLK: 
interval=1

[kernel]
command=uname -r
interval=once
color=#FAA4B2

[gym]
command=./scripts/easyfitness.lua
interval=60

[inet]
interval=1
command=./scripts/check_network.lua
markup=pango

[weather]
interval=60
command=./scripts/weather.lua

[holiday]
interval=360
command=./scripts/holiday.lua
markup=pango

[battery]
command=./scripts/ups_get_wattage.sh
interval=1
color=#FFDF00

[calendar]
command=$SCRIPT_DIR/calendar
interval=1
LABEL=   
DATEFMT=+%a %Y-%m-%d %H:%M:%S
# SHORTFMT=+%H:%M:%S
color=#FF8A65
