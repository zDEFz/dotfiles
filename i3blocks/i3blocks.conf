SCRIPT_DIR=/home/blu/.local/libexec/i3blocks

[memory-usage]
interval=persist
command=$SCRIPT_DIR/custom/memory2
markup=pango
label=mem:
#color=#FFA500


[cpu-temperature]
interval=3
command=$SCRIPT_DIR/temperature
separator=false
label=cpu:

[pavucontrol]
full_text=
command=pavucontrol

# [nvme-temp-nvme0n1]
