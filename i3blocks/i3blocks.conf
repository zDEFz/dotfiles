[ipinfo]
command=curl -s ipinfo.io | jq -e '.org == "null" // "Loc null"'
interval=20
color=#F979FF

[vpn-location-mullvad]
command=mullvad status | grep -o 'in .*' | cut -d' ' -f3-
interval=20
color=#FFF000

[calendar]
command=$SCRIPT_DIR/calendar
interval=1
LABEL=  -
DATEFMT=+%Y-%m-%d %H:%M:%S
# SHORTFMT=+%H:%M:%S
color=#FF8A65

[indoor temp]
command=bash ./scripts/bedroom-get-temperature.sh
interval=60
color=#00BFA5

[indoor humidity]
command=bash ./scripts/bedroom-get-humidity.sh
interval=60
color=#BA68C8

