# 04-app-autostart.conf

# Disabled or Deprecated Commands
# exec_always killall at-spi2-registryd; killall at-spi-bus-launcher
# exec antimicrox --hidden # replaced with input-remapoper
# exec ~/.config/sway/scripts/alacritty-micro-stickies/startup.bash
# exec ~/scripts/autostart/start_keyboard-watcher.bash
# exec thunderbird
# exec /usr/bin/kdenlive
# exec /usr/bin/mdbook serve /mnt/n/iOS-Accessibility-Guide -p 3000 -n 0.0.0.0
# exec /usr/bin/nvtop
# exec /usr/bin/steam -no-browser

exec { 

    # General Autostart Applications
    /usr/bin/code-server --auth none --disable-telemetry
    /usr/lib/xdg-desktop-portal -r
    ~/apps/slippi/./Slippi.AppImage --no-sandbox
    ~/scripts/autostart/script-startup.bash
    ~/scripts/cronjobs/watch-borgbackup-log.bash
    akonadictl stop
    code # vscode
    dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway
    dex --autostart --environment sway
    env RUST_BACKTRACE=1 RUST_LOG=swayr=debug swayrd >> /tmp/swayrd.log 2>&1
    fcitx5 -d
    gammastep
    keepassxc
    mako
    mullvad connect

    # File Manager Instances (only if NAS is online)
    # bash -c 'source ~/.aliases && nas && /home/blu/git/thunar/thunar/./thunar --name Thunar-Animeshows /mnt/storage/anime/anime-shows'
    # bash -c 'source ~/.aliases && nas && /home/blu/git/thunar/thunar/./thunar --name Thunar-Animemovies /mnt/storage/anime/anime-movies'
    
    # launch thunar instances if NAS folders are mounted
'[ -d /mnt/storage ] && \
dbus-launch --exit-with-session thunar --name Thunar-Animeshows /mnt/storage/anime/anime-shows & \
dbus-launch --exit-with-session thunar --name Thunar-Animemovies /mnt/storage/anime/anime-movies &
'
    
}

# Browser Settings
exec_always xdg-settings set default-web-browser cachy-default.desktop
