$bm { 
    # Resizing (Meta + Ctrl)
    $meta+Ctrl+Down resize shrink height 1 px or 1 ppt
    $meta+Ctrl+Left resize grow width 1 px or 1 ppt
    $meta+Ctrl+Right resize shrink width 1 px or 1 ppt
    $meta+Ctrl+Up resize grow height 1 px or 1 ppt

    # Navigation & Layout
    $meta+Down focus down
    $meta+e layout toggle split
    $meta+equal scratchpad show
    $meta+f fullscreen toggle

Control+KP_1 exec swaymsg 'workspace 1, workspace 2, workspace 4, workspace 5, workspace 6, workspace 7, workspace 3'
Control+KP_2 exec swaymsg 'workspace 8, workspace 9, workspace 10, workspace 11, workspace 12, workspace 13, workspace 10'
Control+KP_3 exec swaymsg 'workspace 15, workspace 16, workspace 17, workspace 18, workspace 19, workspace 20, workspace 17'
Control+KP_4 exec swaymsg 'workspace 22, workspace 23, workspace 24, workspace 25, workspace 26, workspace 27, workspace 24'
Control+KP_5 exec swaymsg 'workspace 29, workspace 30, workspace 31, workspace 32, workspace 33, workspace 34, workspace 31'
Control+KP_6 exec swaymsg 'workspace 36, workspace 37, workspace 38, workspace 39, workspace 40, workspace 41, workspace 38'
Control+KP_7 exec swaymsg 'workspace 43, workspace 44, workspace 45, workspace 46, workspace 47, workspace 48, workspace 45'
Control+KP_8 exec swaymsg 'workspace 50, workspace 51, workspace 52, workspace 53, workspace 54, workspace 55, workspace 52'
Control+KP_9 exec swaymsg 'workspace 57, workspace 58, workspace 59, workspace 60, workspace 61, workspace 62, workspace 59'

$meta+KP_1 exec swaymsg 'workspace 64, workspace 65, workspace 66, workspace 67, workspace 68, workspace 69, workspace 66'
$meta+KP_2 exec swaymsg 'workspace 71, workspace 72, workspace 73, workspace 74, workspace 75, workspace 76, workspace 73'
$meta+KP_3 exec swaymsg 'workspace 78, workspace 79, workspace 80, workspace 81, workspace 82, workspace 83, workspace 80'
$meta+KP_4 exec swaymsg 'workspace 85, workspace 86, workspace 87, workspace 88, workspace 89, workspace 90, workspace 87'
$meta+KP_5 exec swaymsg 'workspace 92, workspace 93, workspace 94, workspace 95, workspace 96, workspace 97, workspace 94'
$meta+KP_6 exec swaymsg 'workspace 99, workspace 100, workspace 101, workspace 102, workspace 103, workspace 104, workspace 101'
$meta+KP_7 exec swaymsg 'workspace 106, workspace 107, workspace 108, workspace 109, workspace 110, workspace 111, workspace 108'
$meta+KP_8 exec swaymsg 'workspace 113, workspace 114, workspace 115, workspace 116, workspace 117, workspace 118, workspace 115'
$meta+KP_9 exec swaymsg 'workspace 120, workspace 121, workspace 122, workspace 123, workspace 124, workspace 125, workspace 122'

$alt+KP_1 exec swaymsg 'workspace 127, workspace 128, workspace 129, workspace 130, workspace 131, workspace 132, workspace 129'
$alt+KP_2 exec swaymsg 'workspace 134, workspace 135, workspace 136, workspace 137, workspace 138, workspace 139, workspace 136'
$alt+KP_3 exec swaymsg 'workspace 141, workspace 142, workspace 143, workspace 144, workspace 145, workspace 146, workspace 143'
$alt+KP_4 exec swaymsg 'workspace 148, workspace 149, workspace 150, workspace 151, workspace 152, workspace 153, workspace 150'
$alt+KP_5 exec swaymsg 'workspace 155, workspace 156, workspace 157, workspace 158, workspace 159, workspace 160, workspace 157'
$alt+KP_6 exec swaymsg 'workspace 162, workspace 163, workspace 164, workspace 165, workspace 166, workspace 167, workspace 164'
$alt+KP_7 exec swaymsg 'workspace 169, workspace 170, workspace 171, workspace 172, workspace 173, workspace 174, workspace 171'
$alt+KP_8 exec swaymsg 'workspace 176, workspace 177, workspace 178, workspace 179, workspace 180, workspace 181, workspace 178'
$alt+KP_9 exec swaymsg 'workspace 183, workspace 184, workspace 185, workspace 186, workspace 187, workspace 188, workspace 185'


    # Workspace Switching (Control + KP)
    $alt+KP_0 $ensi ~/.config/sway/scripts/ws-switch.sh prev
    $alt+KP_Decimal $ensi ~/.config/sway/scripts/ws-switch.sh next
    $meta+KP_Decimal $ensi ~/.config/sway/scripts/ws-switch.sh next
    Control+KP_0 $ensi ~/.config/sway/scripts/ws-switch.sh prev
    Control+KP_Decimal $ensi ~/.config/sway/scripts/ws-switch.sh next
    $meta+KP_0 $ensi ~/.config/sway/scripts/ws-switch.sh prev

    # Output Focus (Meta)
    $meta+Left focus output left
    $meta+Right focus output right
    $meta+s layout stacking

    # Miscellaneous (Meta + Shift)
    $meta+Shift+a $mctw next
    $meta+Shift+d $rs 192px 108px,$map 698px 27px,focus output right
    $meta+Shift+Down $md, focus down
    $meta+Shift+g $rs 1280px 1024px, $map 1400px 371px
    $meta+Shift+Left $mtol, focus output left
    $meta+Shift+minus move scratchpad
    $meta+Shift+p $ensi ~/.config/sway/scripts/halt-continue.sh toggle
    $meta+Shift+Right $mtor, focus output right
    $meta+Shift+space floating toggle
    $meta+Shift+Up $mu, focus up
    $meta+space focus mode_toggle
    $meta+t layout tabbed
    $meta+Tab workspace back_and_forth
    $meta+Up $fu
    $meta+v split v
    $meta+x exec 'swaymsg sticky toggle'

    # Close Window
    Control+q kill

    # Menu Focus (Menu + Control)
    Menu+Control+Down $md, focus down
    Menu+Control+Left $mtol, focus output left
    Menu+Control+Right $mtor, focus output right
    Menu+Control+space floating toggle
    Menu+Control+Up $mu, focus up

    # Navigation (Menu)
    Menu+Left $fl
    Menu+Right $fr
    Menu+Up $fu
}


