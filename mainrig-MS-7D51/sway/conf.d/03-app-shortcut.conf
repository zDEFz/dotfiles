# i3 Configuration File - Application Shortcuts

# Open Dolphin file manager
$bm $meta+n $e dolphin

# Capture entire screen
$bm Print $e grim ~/Pictures/screenshot.png

# Capture entire screen to clipboard
$bm Ctrl+Print $e grim - | wl-copy

# Capture selected region to clipboard
$bm Ctrl+Shift+Print $e grim -g "$(slurp)" - | wl-copy

# Capture selected region with a unique name
$bm Shift+Print $e grim ~/Pictures/screenshot-$(date +'%Y-%m-%d-%H%M%S').png -g "$(slurp)"

# Capture active window
$bm $meta+Print $e grim -g "$(swaymsg -t get_tree | jq -r '.. | select(.focused? == true) | .rect | "\(.x),\(.y) \(.width)x\(.height)")" ~/Pictures/screenshot.png

# Capture active window to clipboard
$bm Ctrl+$meta+Print $e grim -g "$(swaymsg -t get_tree | jq -r '.. | select(.focused? == true) | .rect | "\(.x),\(.y) \(.width)x\(.height)")" - | wl-copy

# 191 => G1 (F13)
# 192 => G2 (F14)
# 193 => G3 (F15)
# 194 => G4 (F16)
# 195 => G5 (F17)
# 196 => G6 (F18)

# OCR
    $bc 191 $e ~/.config/sway/GKeys/G1-ocr-en.sh
# CC
    $bc 192 $e ~/.config/sway/GKeys/G2-capturecard.sh
    $bc 194 $e ~/.config/sway/GKeys/G4-triple-click-copy.sh
    # $bc 194 $e swaymsg output DisplayPort-1 mode 1920x1080@240Hz position 1080 1080
    # $bc 195 $e swaymsg output DisplayPort-1 mode 1920x1080@48Hz position 1080 1080

    $bc 196 $e swaylock

# Open alacritty terminal
$bm $meta+Return $e alacritty
$bm Menu+Return $e alacritty
$bm Menu+KP_ENTER $e alacritty

# Reload sway config and i3blocks
$bm $meta+Shift+c exec "swaymsg reload; exec ~/.config/sway/i3blocksreload.sh"

# Restart sway
$bm $meta+Shift+r restart

# Launch Rofi app launcher
# $bm Control+e $e rofi -show drun
$bm Control+e $e wofi --show=drun --location=center --normal-window --width=800px --height=800px

