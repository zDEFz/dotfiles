$bm {
    # media control - general
    XF86AudioLowerVolume $ensi wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
    XF86AudioMicMute $ensi wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
    XF86AudioMute $ensi wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
    XF86AudioRaiseVolume $ensi wpctl set-volume --limit 1.0 @DEFAULT_AUDIO_SINK@ 5%+
    # media control - mpv
    XF86AudioNext $ensi ~/.config/sway/scripts/mediacontrol.sh mpv-next
    XF86AudioPlay $ensi ~/.config/sway/scripts/mediacontrol.sh mpv-pause
    XF86AudioPrev $ensi ~/.config/sway/scripts/mediacontrol.sh mpv-prev
    XF86AudioStop $ensi ~/.config/sway/scripts/mediacontrol.sh mpv-stop
    # media control - playerctl
    $meta+XF86AudioNext $ensi ~/.config/sway/scripts/mediacontrol.sh playerctl-next
    $meta+XF86AudioPlay $ensi ~/.config/sway/scripts/mediacontrol.sh playerctl-play-pause
    $meta+XF86AudioPrev $ensi ~/.config/sway/scripts/mediacontrol.sh playerctl-prev
    $meta+XF86AudioStop $ensi ~/.config/sway/scripts/mediacontrol.sh playerctl-stop
}